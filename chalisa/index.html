<style>
/* ============ GLOBAL RESET + VARIABLES ============ */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --primary: #1a2332;
    --accent: #c89853;
    --text-dark: #1a2332;
    --text-muted: #6b7280;
    --bg-cream: #faf8f3;
    --bg-light: #ffffff;
    --border: #e5e0d3;
}

body {
    font-family: 'Mukta', 'Noto Sans Devanagari', sans-serif;
    background: var(--bg-cream);
    color: var(--text-dark);
    line-height: 1.6;
}

h1, h2, h3, .serif {
    font-family: 'Tiro Devanagari Hindi', 'Noto Sans Devanagari', serif;
    font-weight: 400;
}

.container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 40px;
}

/* ============ CATEGORY HERO ============ */
.category-hero { padding: 0px 0 10px; text-align: center; }
.category-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: white; border: 1px solid var(--border);
    padding: 8px 20px; border-radius: 30px;
    font-size: 12px; color: var(--text-muted);
    letter-spacing: 3px; margin-bottom: 32px;
    text-transform: uppercase;
}
.category-tag .icon { color: var(--accent); }
.category-title { font-size: 80px; line-height: 1.1; color: var(--text-dark); margin-bottom: 16px; font-weight: 400; }
.category-subtitle {
    display: flex; align-items: center; justify-content: center; gap: 20px;
    color: var(--text-muted); font-style: italic;
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 22px; margin-bottom: 32px;
}
.category-subtitle::before, .category-subtitle::after {
    content: ''; width: 60px; height: 1px; background: var(--border);
}
.category-desc { font-size: 18px; color: var(--text-muted); max-width: 700px; margin: 0 auto; line-height: 1.7; }

/* ============ CARDS ============ */
.cards-section { padding: 20px 0 10px; }
.cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
.content-card {
    position: relative; aspect-ratio: 3/4; border-radius: 16px;
    overflow: hidden; cursor: pointer; text-decoration: none; color: white;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.5s ease;
    display: block;
}
.content-card:hover { transform: translateY(-8px) scale(1.01); box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
.content-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
.content-card:hover img { transform: scale(1.09); }

.card-badge {
    position: absolute; top: 12px; left: 12px;
    background: rgba(255,255,255,0.95); color: var(--text-dark);
    padding: 4px 12px; border-radius: 15px;
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
    z-index: 2; letter-spacing: 1px;
}

.card-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
    padding: 30px 16px 16px; color: white;
    transition: padding 0.4s ease; z-index: 2;
}
.content-card:hover .card-overlay { padding-bottom: 24px; }

.card-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; font-family: 'Tiro Devanagari Hindi', serif; }
.card-desc { font-size: 13px; opacity: 0.85; line-height: 1.5; }
.card-read-more {
    font-size: 13px; max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease 0.1s, margin-top 0.4s ease;
    display: flex; align-items: center; gap: 4px; margin-top: 0;
}
.content-card:hover .card-read-more { opacity: 1; max-height: 30px; margin-top: 10px; }

/* ============ RESPONSIVE ============ */
@media (max-width: 1200px) {
    .container { padding: 0 40px; }
    .cards-grid { grid-template-columns: repeat(4, 1fr); }
}

@media (max-width: 1024px) {
    .container { padding: 0 80px; }
    .category-hero { padding: 50px 0 30px; }
    .category-title { font-size: 60px; }
    .category-subtitle { font-size: 18px; }
    .category-desc { font-size: 16px; }
    .cards-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; }
}

@media (max-width: 768px) {
    .container { padding: 0 30px; }
    .category-hero { padding: 30px 0 20px; }
    .category-title { font-size: 40px; }
    .category-tag { font-size: 10px; letter-spacing: 2px; padding: 6px 14px; margin-bottom: 24px; }
    .category-subtitle { font-size: 16px; gap: 12px; }
    .category-subtitle::before, .category-subtitle::after { width: 40px; }
    .category-desc { font-size: 15px; }
    .cards-section { padding: 30px 0 60px; }
    .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .card-title { font-size: 16px; }
    .card-desc { font-size: 11px; }
    .card-badge { font-size: 10px; padding: 3px 8px; top: 8px; left: 8px; }
    .card-overlay { padding: 20px 12px 12px; }
}

@media (max-width: 480px) {
    .container { padding: 0 16px; }
    .category-title { font-size: 32px; }
    .category-subtitle { font-size: 14px; }
    .category-desc { font-size: 14px; }
    .card-title { font-size: 14px; }
}

</div>

<!-- ============ FOOTER PLACEHOLDER ============ -->
<div id="footer-placeholder"></div>

<!-- ============ HEADER + FOOTER LOADER ============ -->
<script>
fetch('/header.html')
    .then(res => res.text())
    .then(html => {
        document.getElementById('header-placeholder').innerHTML = html;
        document.querySelectorAll('#header-placeholder script').forEach(oldScript => {
            const newScript = document.createElement('script');
            newScript.textContent = oldScript.textContent;
            oldScript.parentNode.replaceChild(newScript, oldScript);
        });
    })
    .catch(err => console.error('Header load failed:', err));

fetch('/footer.html')
    .then(res => res.text())
    .then(html => {
        document.getElementById('footer-placeholder').innerHTML = html;
    })
    .catch(err => console.error('Footer load failed:', err));
</script>

</body>
